# Release workflow — fires when a tag matching v* is pushed.
#
# Produces:
#   1. GitHub release at https://github.com/beevibe-ai/beevibe/releases/<tag>
#      with 4 native daemon binaries (darwin-arm64, darwin-x64,
#      linux-x64, linux-arm64) + a companion .sha256 file per binary
#      (used by the daemon's `update` command for integrity verification).
#   2. npm package @beevibe/daemon@<version> on the public registry
#      (single-file bundle with workspace deps inlined).
#   3. Commit to beevibe-ai/homebrew-tap that bumps the formula's
#      version + SHA256s. Requires a HOMEBREW_TAP_TOKEN secret with
#      contents:write access to that repo.
#
# Cutting a release:
#   git tag v0.1.0 && git push origin v0.1.0
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # for GitHub release creation

jobs:
  build-binaries:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync package.json version to tag
        run: |
          node -e "
            const fs = require('node:fs');
            const path = 'packages/daemon/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build native daemon binaries (4 platforms)
        run: bash packages/daemon/scripts/build-binaries.sh

      - name: Generate SHA256 companion files
        working-directory: packages/daemon/dist-bin
        run: |
          for f in beevibe-daemon-*; do
            shasum -a 256 "$f" > "$f.sha256"
          done
          ls -la

      - name: Upload binaries as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-binaries
          path: packages/daemon/dist-bin/*

      - name: Prepare npm publish bundle
        run: bash packages/daemon/scripts/prepare-publish.sh

      - name: Upload npm publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-publish-dist
          path: packages/daemon/publish-dist/

  github-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: daemon-binaries
          path: ./release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Mark v*-rc*, v*-beta*, v*-alpha* tags as pre-releases so they
          # don't get badged as "Latest release" on the repo page.
          prerelease: ${{ contains(github.ref_name, '-') }}

  update-release-branch:
    # `release` is a movable pointer to the latest stable tag's commit —
    # the Railway template pins services to this branch instead of a
    # specific tag, so new template clickers always get the freshest
    # release at click time without us needing to re-publish the template.
    # Existing Railway deploys are unaffected because the template's
    # auto-deploy is off; users manually redeploy to pick up changes.
    needs: build-binaries
    if: "!contains(github.ref_name, '-')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
      - name: Force-update release branch to this tag's commit
        run: git push --force origin "${{ github.sha }}:refs/heads/release"

  npm-publish:
    needs: build-binaries
    runs-on: ubuntu-latest
    # `id-token: write` serves two purposes at once: npm Trusted Publishing
    # auth (no NPM_TOKEN needed) and the provenance attestation that ships
    # with the published tarball.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: daemon-publish-dist
          path: ./publish-dist

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      # Trusted Publishing (OIDC-based npm publish) requires npm CLI
      # 11.5.0+. Node 20's bundled npm is 10.x; upgrade explicitly so
      # `npm publish --provenance` exchanges the GitHub OIDC token for
      # an npm publish token instead of looking for a static token in
      # ~/.npmrc. Pinned to ^11.5 (not @latest) for reproducibility;
      # bump when npm publish API changes.
      - name: Upgrade npm to a Trusted-Publishing-capable version
        run: npm install -g 'npm@^11.5'

      - name: npm publish
        working-directory: ./publish-dist
        env:
          # Passed via env (not inline `${{ }}`) to avoid command-injection
          # risk and shellcheck false positive on the pattern match.
          TAG_NAME: ${{ github.ref_name }}
        # Pre-release tags (v0.0.1-rc1, v0.1.0-beta.2, etc.) ship under
        # the `next` dist-tag so `npm install @beevibe/daemon` still
        # pulls the latest stable. The dist-tag becomes `latest` for
        # any tag without a hyphen.
        run: |
          set -euo pipefail
          if [[ "$TAG_NAME" == *-* ]]; then
            npm publish --access=public --provenance --tag next
          else
            npm publish --access=public --provenance
          fi

  update-homebrew-tap:
    needs: [build-binaries, github-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: daemon-binaries
          path: ./release-assets

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: beevibe-ai/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ needs.build-binaries.outputs.version }}
        run: |
          set -euo pipefail
          cd release-assets
          SHA_DARWIN_ARM64=$(cut -d' ' -f1 beevibe-daemon-darwin-arm64.sha256)
          SHA_DARWIN_X64=$(cut -d' ' -f1 beevibe-daemon-darwin-x64.sha256)
          SHA_LINUX_X64=$(cut -d' ' -f1 beevibe-daemon-linux-x64.sha256)
          SHA_LINUX_ARM64=$(cut -d' ' -f1 beevibe-daemon-linux-arm64.sha256)

          cd ../homebrew-tap
          mkdir -p Formula

          cat > Formula/beevibe-daemon.rb <<EOF
          class BeevibeDaemon < Formula
            desc "Beevibe daemon — runs agent CLIs locally on your machine"
            homepage "https://github.com/beevibe-ai/beevibe"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/beevibe-ai/beevibe/releases/download/v${VERSION}/beevibe-daemon-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/beevibe-ai/beevibe/releases/download/v${VERSION}/beevibe-daemon-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/beevibe-ai/beevibe/releases/download/v${VERSION}/beevibe-daemon-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
              on_arm do
                url "https://github.com/beevibe-ai/beevibe/releases/download/v${VERSION}/beevibe-daemon-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            def install
              # The URL above points at a single binary (not an archive);
              # brew downloads it raw into the build dir. Rename into bin/.
              bin.install Dir["*"].first => "beevibe-daemon"
            end

            test do
              system "#{bin}/beevibe-daemon", "--help"
            end
          end
          EOF

          git config user.email "actions@github.com"
          git config user.name "beevibe-release-bot"
          git add Formula/beevibe-daemon.rb
          git commit -m "beevibe-daemon ${VERSION}" || echo "no changes"
          git push
